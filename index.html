<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeSnap Pro · Web IDE</title>
  
  <!-- External Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app" class="app theme-dark">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="window-controls">
        <span class="window-dot dot-red"></span>
        <span class="window-dot dot-yellow"></span>
        <span class="window-dot dot-green"></span>
      </div>
      <div class="title-text">
        <i class="fas fa-code"></i>
        <span id="projectName">CodeSnap Pro</span>
      </div>
      <div class="action-icons">
        <i class="fas fa-moon" id="themeToggle" title="Toggle theme"></i>
        <i class="fas fa-download" id="downloadProject" title="Download as ZIP"></i>
        <i class="fas fa-upload" id="uploadProject" title="Upload project"></i>
        <input type="file" id="fileUploadInput" accept=".zip,.html,.css,.js" style="display:none" multiple>
      </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace">
      <!-- Activity Bar -->
      <div class="activity-bar">
        <div class="activity-icon active" data-view="explorer" title="Explorer">
          <i class="fas fa-files"></i>
        </div>
        <div class="activity-icon" data-view="search" title="Search">
          <i class="fas fa-search"></i>
        </div>
        <div class="activity-icon" data-view="console" title="Console">
          <i class="fas fa-terminal"></i>
        </div>
      </div>

      <!-- Sidebar (Explorer/Console) -->
      <div class="sidebar" id="sidebar">
        <!-- File Explorer Panel -->
        <div class="explorer-panel" id="explorerPanel">
          <div class="panel-header">
            <span>EXPLORER</span>
            <div class="panel-actions">
              <i class="fas fa-file-plus" id="newFileBtn" title="New File"></i>
              <i class="fas fa-folder-plus" id="newFolderBtn" title="New Folder (soon)"></i>
              <i class="fas fa-sync-alt" id="refreshExplorer" title="Refresh"></i>
            </div>
          </div>
          <div class="file-tree" id="fileTree"></div>
        </div>

        <!-- Console Panel -->
        <div class="console-panel" id="consolePanel" style="display:none">
          <div class="panel-header">
            <span>CONSOLE</span>
            <div class="panel-actions">
              <i class="fas fa-trash-alt" id="clearConsole" title="Clear console"></i>
            </div>
          </div>
          <div class="console-output" id="consoleOutput"></div>
        </div>
      </div>

      <!-- Editor + Preview Container -->
      <div class="editor-preview-container" id="splitContainer">
        <!-- Editor Panel -->
        <div class="editor-pane" id="editorPane">
          <div class="editor-tabs" id="editorTabs"></div>
          <div class="editor-wrapper">
            <textarea id="codeEditor"></textarea>
          </div>
        </div>

        <!-- Preview Panel -->
        <div class="preview-pane" id="previewPane">
          <div class="preview-header">
            <span class="preview-title">
              <i class="fas fa-eye"></i> PREVIEW
            </span>
            <div class="preview-actions">
              <i class="fas fa-sync-alt" id="refreshPreview" title="Refresh preview"></i>
              <i class="fas fa-expand" id="toggleFullscreen" title="Toggle fullscreen"></i>
              <i class="fas fa-external-link-alt" id="openInNewTab" title="Open in new tab"></i>
            </div>
          </div>
          <div class="preview-container">
            <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"></iframe>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-item" id="fileInfo">
          <i class="fas fa-code"></i>
          <span id="currentFileInfo">index.html</span>
        </span>
        <span class="status-item" id="cursorPosition">Ln 1, Col 1</span>
      </div>
      <div class="status-center">
        <span class="status-item" id="previewStatus">
          <i class="fas fa-check-circle"></i>
          <span>Preview ready</span>
        </span>
      </div>
      <div class="status-right">
        <span class="status-item" id="themeStatus">
          <i class="fas fa-palette"></i>
          <span>Dark</span>
        </span>
        <span class="status-item" id="fileCount">3 files</span>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <!-- Application Scripts (ES Modules) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
