<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web IDE Pro · VS Code Style</title>
  
  <!-- Dependencies -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app" class="app theme-dark">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="window-controls">
        <span class="window-dot dot-red"></span>
        <span class="window-dot dot-yellow"></span>
        <span class="window-dot dot-green"></span>
      </div>
      <div class="title-text">
        <i class="fas fa-code"></i>
        <span>Web IDE Pro</span>
      </div>
      <div class="action-icons">
        <i class="fas fa-play" id="runButton" title="Run (Ctrl+Enter)"></i>
        <i class="fas fa-moon" id="themeToggle" title="Toggle theme"></i>
        <i class="fas fa-download" id="downloadProject" title="Download as ZIP"></i>
        <i class="fas fa-upload" id="uploadBtn" title="Upload files"></i>
        <i class="fas fa-folder-open" id="uploadFolderBtn" title="Upload folder"></i>
        <input type="file" id="fileInput" multiple style="display:none">
        <input type="file" id="folderInput" webkitdirectory multiple style="display:none">
      </div>
    </div>

    <!-- Main Workspace -->
    <div class="workspace">
      <!-- Activity Bar -->
      <div class="activity-bar">
        <div class="activity-icon active" data-view="explorer">
          <i class="fas fa-files"></i>
        </div>
        <div class="activity-icon" data-view="console">
          <i class="fas fa-terminal"></i>
        </div>
        <div class="activity-icon" data-view="search">
          <i class="fas fa-search"></i>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar" id="sidebar">
        <!-- Explorer Panel -->
        <div class="explorer-panel" id="explorerPanel">
          <div class="panel-header">
            <span>EXPLORER</span>
            <div class="panel-actions">
              <i class="fas fa-file-plus" id="newFileBtn" title="New File"></i>
              <i class="fas fa-folder-plus" id="newFolderBtn" title="New Folder"></i>
              <i class="fas fa-sync-alt" id="refreshExplorer" title="Refresh"></i>
            </div>
          </div>
          <div class="file-tree-container">
            <div class="workspace-info" id="workspaceInfo">
              <i class="fas fa-chevron-down"></i>
              <span>WORKSPACE</span>
            </div>
            <div class="file-tree" id="fileTree"></div>
          </div>
        </div>

        <!-- Console Panel -->
        <div class="console-panel" id="consolePanel" style="display:none">
          <div class="panel-header">
            <span>CONSOLE</span>
            <div class="panel-actions">
              <i class="fas fa-ban" id="clearConsole" title="Clear console"></i>
              <select id="consoleFilter" class="console-filter">
                <option value="all">All</option>
                <option value="log">Log</option>
                <option value="error">Error</option>
                <option value="warn">Warn</option>
              </select>
            </div>
          </div>
          <div class="console-output" id="consoleOutput"></div>
        </div>
      </div>

      <!-- Editor + Preview -->
      <div class="editor-preview-container" id="splitContainer">
        <!-- Editor -->
        <div class="editor-pane" id="editorPane">
          <div class="editor-tabs" id="editorTabs"></div>
          <div class="editor-wrapper">
            <textarea id="codeEditor"></textarea>
          </div>
        </div>

        <!-- Preview -->
        <div class="preview-pane" id="previewPane">
          <div class="preview-header">
            <span class="preview-title">
              <i class="fas fa-eye"></i> PREVIEW
            </span>
            <div class="preview-actions">
              <div class="run-button-group">
                <button class="run-btn" id="runPreviewBtn">
                  <i class="fas fa-play"></i> Run
                </button>
                <button class="auto-run-btn" id="autoRunToggle" title="Auto-run on change">
                  <i class="fas fa-magic"></i>
                </button>
              </div>
              <i class="fas fa-sync-alt" id="refreshPreview" title="Refresh"></i>
              <i class="fas fa-expand" id="toggleFullscreen" title="Fullscreen"></i>
              <i class="fas fa-external-link-alt" id="openInNewTab" title="Open in new tab"></i>
            </div>
          </div>
          <div class="preview-container">
            <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups allow-downloads"></iframe>
            <div class="preview-placeholder" id="previewPlaceholder">
              <i class="fas fa-play-circle"></i>
              <h3>Preview Ready</h3>
              <p>Click <strong>Run</strong> or press <strong>Ctrl+Enter</strong> to preview</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-left">
        <span class="status-item" id="fileInfo">
          <i class="fas fa-code"></i>
          <span>No file open</span>
        </span>
        <span class="status-item" id="cursorPosition">Ln 1, Col 1</span>
      </div>
      <div class="status-center">
        <span class="status-item" id="previewStatus">
          <i class="fas fa-circle"></i>
          <span>Ready to run</span>
        </span>
      </div>
      <div class="status-right">
        <span class="status-item" id="autoRunStatus">
          <i class="fas fa-magic"></i>
          <span>Auto-run OFF</span>
        </span>
        <span class="status-item" id="fileCount">0 files</span>
        <span class="status-item" id="themeStatus">Dark</span>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="contextMenu" class="context-menu" style="display:none">
    <div class="context-item" data-action="newFile">
      <i class="fas fa-file-plus"></i> New File
    </div>
    <div class="context-item" data-action="newFolder">
      <i class="fas fa-folder-plus"></i> New Folder
    </div>
    <div class="context-divider"></div>
    <div class="context-item" data-action="rename">
      <i class="fas fa-edit"></i> Rename
    </div>
    <div class="context-item" data-action="delete">
      <i class="fas fa-trash"></i> Delete
    </div>
    <div class="context-divider"></div>
    <div class="context-item" data-action="download">
      <i class="fas fa-download"></i> Download
    </div>
  </div>

  <!-- Drag & Drop Overlay -->
  <div id="dropOverlay" class="drop-overlay" style="display:none">
    <div class="drop-message">
      <i class="fas fa-cloud-upload-alt"></i>
      <h2>Drop files or folders here</h2>
      <p>Upload to workspace</p>
      <div class="drop-progress" id="dropProgress" style="display:none">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p id="progressText">Uploading...</p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <!-- Application -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
